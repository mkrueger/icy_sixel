name: Run tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
env:
  CARGO_TERM_COLOR: always
jobs:
  run_checks:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4   
    - name: Check formatting
      run: |
        cargo fmt --all -- --check
    - name: Clippy
      run: |
        cargo clippy --all-targets --all-features -- -D warnings
    - name: Run tests
      run: |
        cargo test --all-features